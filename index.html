<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#E60000" />
  <title>VodaPay Store</title>

  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  CRITICAL: VodaPay Mini Program Bridge Script            ║
    ║                                                          ║
    ║  This script MUST be loaded before any of your own JS.   ║
    ║  It injects the global `my` object into the WebView,     ║
    ║  which exposes all VodaPay JSAPIs to your H5 app:        ║
    ║                                                          ║
    ║    my.postMessage()  → Send message to Mini Program      ║
    ║    my.onMessage      → Receive from Mini Program         ║
    ║    my.getEnv()       → Detect if inside mini program     ║
    ║    my.navigateTo()   → Navigate mini program pages       ║
    ║    my.alert()        → Native alert dialog               ║
    ║    ...and many more                                      ║
    ║                                                          ║
    ║  The domain cdn.marmot-cloud.com must be whitelisted     ║
    ║  in your VodaPay portal H5 Domain Whitelist.             ║
    ╚══════════════════════════════════════════════════════════╝
  -->
  <script src="https://appx/web-view.min.js" type="text/javascript"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      background: #F5F5F5;
    }
    /* Prevent iOS scroll bounce on body */
    body { position: fixed; width: 100%; }
    #app { position: fixed; width: 100%; height: 100%; overflow-y: auto; }
  </style>

</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
